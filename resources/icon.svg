<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Map pin -->
  <g transform="translate(64, 56)">
    <!-- Pin head -->
    <circle cx="0" cy="0" r="22" fill="white"/>
    <!-- Pin body -->
    <path d="M0 46 L-12 18 L12 18 Z" fill="white"/>
    <!-- Inner circle (hole) -->
    <circle cx="0" cy="0" r="10" fill="#2563eb"/>
  </g>

  <!-- AI sparkle -->
  <g transform="translate(88, 36)">
    <path d="M0 -6 L1.5 -1.5 L6 0 L1.5 1.5 L0 6 L-1.5 1.5 L-6 0 L-1.5 -1.5 Z" fill="#ffdf64"/>
  </g>
</svg>
