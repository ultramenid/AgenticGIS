[flake8]
max-line-length = 120
exclude = 
    .git,
    __pycache__,
    dev/,
    tests/,
    .pytest_cache,
    .venv,
    venv
# Per-file ignores for test files that need sys.path manipulation
per-file-ignores = 
    # E402: imports not at top (test files need sys.path setup)
    # F841: unused variables (common in test stubs)
    dev/*: E402,W291,W292,W293,E302,E305,E306,E501,E711,E712,E741,E272,F401,F541,F841
    tests/*: E402,W291,W292,W293,E302,E305,E306,E501,E711,E712,E741,E272,F401,F541,F841
